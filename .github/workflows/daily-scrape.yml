name: Daily NUSMods Scrape & Analyse

on:
  push:
    branches:
      - reviewAnalyser  
      - main
    - cron: '0 */2 * * *' 
  workflow_dispatch:

jobs:
  scrape_and_analyse:
    runs-on: ubuntu-latest
    timeout-minutes: 120 

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json

      - name: Install dependencies
        working-directory: scraper
        run: npm install

      - name: Install Playwright Chromium
        working-directory: scraper
        run: npx playwright install chromium --with-deps

      - name: Run Scraper
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scraper.mjs --limit=400

      - name: Run Sentiment Analyser
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        # Runs the analyser with the explicit garbage collection flag to keep runtime memory stable
        run: node --expose-gc analyser.mjs

      - name: Log completion
        run: echo "Scraping and analysis pipeline completed at $(date)"